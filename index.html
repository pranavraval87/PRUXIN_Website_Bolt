        "@type": "Offer",
        "pricingType": "PayAsYouGo",

          "@type": "Country",
          "name": "United Kingdom"
        }
      },
      "provider": {
        "@type": "Organization",
        "name": "PRUXIN",
        "url": "https://www.pruxin.io",
        "logo": "https://www.pruxin.io/Pruxin_logo_LIGHT copy.svg",

      "keywords": "AI receptionist UK, missed call solution, automatic call answering, virtual receptionist UK, small business phone answering"
